ъname: Schema Merge Analyzer

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  analyze-schema-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run analyzer on sample DDL
        run: |
          mkdir -p schema-merge-report
          python -m src.conflict_detector.cli \
            --base base.sql \
            --a branch_a.sql \
            --b branch_b.sql \
            --out schema-merge-report \
            --impact-threshold 5

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: schema-merge-report
          path: schema-merge-report/
