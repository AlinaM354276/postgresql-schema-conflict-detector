name: Schema Merge Analyzer

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  analyze-schema-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Fetch all branches
        run: |
          git fetch --all

      - name: Run analyzer on Git branches
        run: |
          mkdir -p schema-merge-report
          python -m src.conflict_detector.cli \
            --repo . \
            --branch-a origin/test-a \
            --branch-b origin/test-b \
            --out schema-merge-report \
            --impact-threshold 5

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: schema-merge-report
          path: schema-merge-report/