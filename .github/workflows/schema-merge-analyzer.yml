name: Schema Merge Analyzer

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  analyze-schema-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest graphviz

      - name: Run automated tests
        run: |
          python -m pytest -q

      - name: Fetch all branches
        run: |
          git fetch --all


      - name: Extract schemas from branches
        run: |
          mkdir -p ci_extract

          git show origin/main:ci_demo/schema.sql > ci_extract/base.sql
          git show origin/test-a:ci_demo/schema.sql > ci_extract/a.sql
          git show origin/test-b:ci_demo/schema.sql > ci_extract/b.sql

      - name: Run analyzer
        run: |
          mkdir -p schema-merge-report
  
          python -m src.conflict_detector.cli \
            --base ci_extract/base.sql \
            --a ci_extract/a.sql \
            --b ci_extract/b.sql \
            --out schema-merge-report \
            --impact-threshold 5

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: schema-merge-report
          path: schema-merge-report/